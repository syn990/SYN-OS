[Appearance]
# Rewritten with a real absolute path by syn-theme-apply on first login
# (see labwc/autostart); usernames are configurable so no static path here
# is correct for every install. This placeholder is only live in the brief
# window before autostart runs.
color_scheme_path=REPLACED_ON_FIRST_LOGIN
custom_palette=true
icon_theme=breeze-dark
standard_dialogs=default
style=Fusion

[Fonts]
fixed="Terminus,9,-1,5,50,0,0,0,0,0"
general="Terminus,9,-1,5,50,0,0,0,0,0"

[Interface]
activate_item_on_single_click=1
buttonbox_layout=0
cursor_flash_time=1000
dialog_buttons_have_icons=1
double_click_interval=400
gui_effects=@Invalid()
keyboard_scheme=2
menus_have_icons=true
show_shortcuts_in_context_menus=true
stylesheets=/usr/share/qt5ct/qss/fusion-fixes.qss, /usr/share/qt5ct/qss/scrollbar-simple.qss, /usr/share/qt5ct/qss/sliders-simple.qss, /usr/share/qt5ct/qss/tooltip-simple.qss, /usr/share/qt5ct/qss/traynotification-simple.qss
toolbutton_style=4
underline_shortcut=1
wheel_scroll_lines=3

[SettingsWindow]
geometry=@ByteArray(\x1\xd9\xd0\xcb\0\x3\0\0\0\0\x2\xef\0\0\x1+\0\0\x5\xd1\0\0\x3h\0\0\x2\xf1\0\0\x1?\0\0\x5\xcf\0\0\x3\x63\0\0\0\0\0\0\0\0\a\x80\0\0\x2\xf1\0\0\x1?\0\0\x5\xcf\0\0\x3\x63)

[Troubleshooting]
force_raster_widgets=1
ignored_applications=@Invalid()
