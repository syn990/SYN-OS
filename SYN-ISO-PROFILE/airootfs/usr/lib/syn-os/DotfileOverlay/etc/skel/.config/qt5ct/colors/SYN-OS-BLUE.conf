[ColorScheme]
# Role order is Qt5's QPalette::ColorRole enum (verified against qpalette.h
# and cross-checked against qt5ct's own shipped /usr/share/qt5ct/colors/darker.conf):
# WindowText, Button, Light, Midlight, Dark, Mid, Text, BrightText, ButtonText,
# Base, Window, Shadow, Highlight, HighlightedText, Link, LinkVisited,
# AlternateBase, NoRole, ToolTipBase, ToolTipText, PlaceholderText.
# A prior version of this file had background/foreground roles swapped
# (WindowText=bg, Window/Base=text), which rendered every Qt app white-on-white.
active_colors=#ffffffff, #ff302f2e, #ff0a1a4a, #ff302f2e, #ff00071d, #ff5c5b5a, #ffffffff, #ffffffff, #ffffffff, #ff00071d, #ff010b2c, #ff00071d, #ff0986d3, #ffffffff, #ff0986d3, #ff1a2f5c, #ff00071d, #ffffffff, #ff00071d, #ffffffff, #800986d3
disabled_colors=#ff5c5b5a, #ff302f2e, #ff0a1a4a, #ff302f2e, #ff00071d, #ff5c5b5a, #ff5c5b5a, #ff5c5b5a, #ff5c5b5a, #ff00071d, #ff010b2c, #ff00071d, #ff1a2f5c, #ff5c5b5a, #ff1a2f5c, #ff1a2f5c, #ff00071d, #ff5c5b5a, #ff00071d, #ff5c5b5a, #800986d3
inactive_colors=#ffffffff, #ff302f2e, #ff0a1a4a, #ff302f2e, #ff00071d, #ff5c5b5a, #ffffffff, #ffffffff, #ffffffff, #ff00071d, #ff010b2c, #ff00071d, #ff0986d3, #ffffffff, #ff0986d3, #ff1a2f5c, #ff00071d, #ffffffff, #ff00071d, #ffffffff, #800986d3
