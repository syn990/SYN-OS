# ------------------------------------------------------------------------------
#                               SYN‑OS • Foot Config
#                     Official Configuration for foot (Wayland)
#
#   Purpose        : Defines terminal appearance and behaviour for SYN‑OS,
#                    including fonts, colour palette, CSD styling, scrollback,
#                    keybindings and application defaults.
#
#   Component      : foot / footclient
#   Environment    : SYN‑OS (Syntax Operating System)
#   Maintainer     : William Hayward-Holland (Syntax990)
#   License        : MIT License
# ------------------------------------------------------------------------------

# ----- Identity & Window ------------------------------------------------------
app-id=foot
title=Terminal
dpi-aware=yes
# The pad values add subtle margins; "center" recentres the grid when resizing.
pad=8x6 center
resize-by-cells=yes
resize-delay-ms=100

# ----- Font -------------------------------------------------------------------
font=Terminus:size=14
bold-text-in-bright=yes

# ----- Scrollback --------------------------------------------------------------
[scrollback]
lines=10000

# ----- URL handling -----------------------------------------------------------
[url]
# Use your preferred opener; xdg-open is sane on most desktops.
launch=xdg-open ${url}
label-letters=sadfjklewcmpgh
osc8-underline=url-mode

# ----- Colours (SYN-OS theme; managed by syn-theme-apply) ---------------------
[colors-dark]
alpha=0.7
background=000000
foreground=f8f8f2

regular0=100000
regular1=800000
regular2=f8f8f2
regular3=400101
regular4=444444
regular5=260101
regular6=2c0101
regular7=f8f8f2

bright0=444444
bright1=ff5555
bright2=f8f8f2
bright3=400101
bright4=444444
bright5=260101
bright6=2c0101
bright7=f8f8f2
[csd]
color=4c566a
hide-when-maximized=yes

# ----- Key Bindings -----------------------------------------------------------
[key-bindings]
# Reveal and launch URLs visible on screen (foot will display hints).
show-urls-launch=Control+Shift+o

# Common UX: zoom controls, reset.
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0


# Spawn another terminal quickly.
spawn-terminal=Control+Shift+n

# Search (scrollback) start.
search-start=Control+Shift+r

# Clipboard copy/paste (typical terminal conventions).
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert
unicode-input=Control+Shift+u



# ----- Optional: Touch --------------------------------------------------------
[touch]
long-press-delay=400
