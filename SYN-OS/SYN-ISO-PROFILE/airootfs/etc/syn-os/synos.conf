# ============================================================================================
#  SYN‑OS Runtime Configuration /etc/syn-os/synos.conf
#  (Declarative Installer State with Strategy Selectors)
# ============================================================================================

# ----- System Identity -----
Hostname="synbox"
UserAccountName="syntax990"
# CHANGE ME: plaintext here only because it's consumed once during install
# (piped straight into chpasswd inside the chroot, never logged, never
# written back to this file). Change it after first login regardless
# (passwd). Required — Stage 1 refuses to proceed with the CHANGE_ME
# placeholder, same as Disk above.
UserAccountPassword="CHANGE_ME"
UserShell="/bin/zsh"

# ----- Locale / Input / Time -----
Locale="en_GB.UTF-8"
LocaleGen="en_GB.UTF-8 UTF-8"
KeyMap="uk"
TimeZone="GB"
VconsoleFont="ter-v16n"

# ----- Disk / Firmware Detection -----
# CHANGE ME: must be the exact target disk (e.g. /dev/sda, /dev/nvme0n1).
# RequireWipeConfirm below asks before wiping it, but there's no default
# that's safe to leave unexamined: pick whichever real device name happens
# to match here and the confirm prompt is the only thing standing between
# you and a wiped disk. Check with `lsblk` first.
Disk="CHANGE_ME"
BootMode="auto"               # auto|uefi|mbr
BootSize="512MiB"

# ----- STRATEGY SELECTORS (modular functions) -----
# PartitionStrat="auto" (recommended, and the default) detects the machine's
# real firmware and picks for you:
#   UEFI                     -> uefi-bootctl
#   BIOS/legacy, Encryption=no  -> mbr-syslinux
#   BIOS/legacy, Encryption=yes -> mbr-grub (syslinux can't do LUKS)
#
# You can still set one explicitly below, but it must match the machine
# you're actually installing on. The installer checks real firmware state
# (/sys/firmware/efi/efivars) and refuses to continue on a mismatch (e.g.
# uefi-bootctl set on a BIOS-only machine), rather than silently building an
# unbootable disk.
#
# uefi-bootctl: GPT + systemd-boot. Supports Encryption yes/no.
# mbr-syslinux: MBR + syslinux. Encryption must be "no", syslinux has no
#                 LUKS support and mbr-syslinux has no separate boot
#                 partition to fall back on. Use mbr-grub instead if you
#                 want BIOS/MBR + encryption.
# mbr-grub      : MBR + GRUB, with its own small unencrypted /boot partition.
#                 Supports Encryption yes/no (GRUB never touches the
#                 encrypted root directly, same division of labour as
#                 uefi-bootctl: the initramfs unlocks it at boot).
PartitionStrat="auto"          # auto | uefi-bootctl | mbr-syslinux | mbr-grub

# Encryption/UseLvm are independent yes/no flags, set either or both.
# (Internally these combine into the four volume strategies SYN-OS has
# always supported: plain, LUKS-only, LVM-only, or LUKS+LVM.)
Encryption="yes"               # yes | no: whole-disk LUKS2 on root
UseLvm="yes"                   # yes | no: LVM on top of root (or on top of
                                #            the LUKS mapper, if both are yes)

FilesystemStrat="f2fs"         # ext4 | f2fs | btrfs | xfs
BootloaderStrat="auto"         # auto | systemd-boot | syslinux | grub

# Which package array in syn-packages.zsh pacstrapMain installs.
# full    -> SYNSTALL   (everything: base, desktop stack, dev tools, apps, fonts)
# minimal -> SYNMINIMAL (base + networking + shell + desktop stack only —
#                         enough to boot to a working labwc/waybar session
#                         and prove the install pipeline itself is sound,
#                         without appsMedia/devToolkit's heavier packages)
PackageProfile="full"          # full | minimal

# ----- Filesystems -----
BootFs="fat32"                 # fat32 for uefi-bootctl's ESP, ext4 for mbr-grub's /boot
RootFs="f2fs"                  # matches FilesystemStrat

# ----- LUKS (if Encryption="yes") -----
LuksCipher="aes-xts-plain64"
LuksKeySize="512"
LuksPbkdf="argon2id"
LuksLabel="cryptroot"
# CHANGE ME: plaintext here only because it's consumed once during install
# (piped straight into cryptsetup luksFormat, never logged, never written
# back to this file). Change it after first login regardless — see
# https://wiki.archlinux.org/title/Dm-crypt/Device_encryption for how to
# add/change a LUKS passphrase on an existing volume. Required if
# Encryption=yes — Stage 0 refuses to proceed with the CHANGE_ME
# placeholder, same as UserAccountPassword above.
LuksPassphrase="CHANGE_ME"

# ----- LVM (if UseLvm="yes") -----
VgName="vg0"
LvRootName="root"
LvSwapName="swap"
SwapSize="0"                   # "0" to disable; "8G" to enable swap LV

# ----- Mount Points -----
RootMountLocation="/mnt"
BootMountLocation="/mnt/boot"

# ----- Bootloader Tuning -----
KernelOpts="quiet splash"

# ----- Remote Access -----
# yes: enables sshd at boot on the installed system (openssh is always
# installed either way, see Package Collection — this only controls
# whether the service starts automatically). no (default): sshd stays
# installed but disabled, same as a plain Arch install; enable later
# with 'sudo systemctl enable --now sshd' if you change your mind.
EnableSsh="no"                 # yes | no

# ----- Safety -----
# When "yes" (default, and not meant to be turned off casually), Stage 0
# interactively asks "Proceed and wipe <disk>? [y/N]" before touching the
# disk. Set to "no" only if you specifically want a fully unattended install
# (e.g. scripted/automated provisioning) and have already verified Disk is
# correct through some other means.
RequireWipeConfirm="yes"