[ColorScheme]
# Role order is Qt5's QPalette::ColorRole enum (verified against qpalette.h
# and cross-checked against qt5ct's own shipped /usr/share/qt5ct/colors/darker.conf):
# WindowText, Button, Light, Midlight, Dark, Mid, Text, BrightText, ButtonText,
# Base, Window, Shadow, Highlight, HighlightedText, Link, LinkVisited,
# AlternateBase, NoRole, ToolTipBase, ToolTipText, PlaceholderText.
# A prior version of this file had background/foreground roles swapped
# (WindowText=bg, Window/Base=text), which rendered every Qt app white-on-white.
active_colors=#fff8f8f2, #ff2c0101, #ff400101, #ff2c0101, #ff100000, #ff444444, #fff8f8f2, #fff8f8f2, #fff8f8f2, #ff100000, #ff000000, #ff100000, #ff800000, #fff8f8f2, #ff800000, #ff260101, #ff100000, #fff8f8f2, #ff100000, #fff8f8f2, #80800000
disabled_colors=#ff444444, #ff2c0101, #ff400101, #ff2c0101, #ff100000, #ff444444, #ff444444, #ff444444, #ff444444, #ff100000, #ff000000, #ff100000, #ff260101, #ff444444, #ff260101, #ff260101, #ff100000, #ff444444, #ff100000, #ff444444, #80800000
inactive_colors=#fff8f8f2, #ff2c0101, #ff400101, #ff2c0101, #ff100000, #ff444444, #fff8f8f2, #fff8f8f2, #fff8f8f2, #ff100000, #ff000000, #ff100000, #ff800000, #fff8f8f2, #ff800000, #ff260101, #ff100000, #fff8f8f2, #ff100000, #fff8f8f2, #80800000
