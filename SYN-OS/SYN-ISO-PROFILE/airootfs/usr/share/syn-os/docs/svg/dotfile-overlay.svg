<text xml:space="preserve" text-anchor="middle" x="377" y="-94.25" font-family="monospace" font-size="10.00" fill="#e0c896">A dev machine&#39;s live ~/.config and /etc/skel</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-80" font-family="monospace" font-size="10.00" fill="#e0c896">are a snapshot from whenever THAT system was</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-65.75" font-family="monospace" font-size="10.00" fill="#e0c896">installed or last rebuilt. Editing them changes</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-51.5" font-family="monospace" font-size="10.00" fill="#e0c896">only the running session, never this repo.</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-37.25" font-family="monospace" font-size="10.00" fill="#e0c896">Editing DotfileOverlay/ here changes only future</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-23" font-family="monospace" font-size="10.00" fill="#e0c896">builds, never the current desktop. The two only</text>
<text xml:space="preserve" text-anchor="middle" x="377" y="-8.75" font-family="monospace" font-size="10.00" fill="#e0c896">meet at install/rebuild time, never live.</text>
