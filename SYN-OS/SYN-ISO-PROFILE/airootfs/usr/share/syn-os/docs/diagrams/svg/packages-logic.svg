<polygon fill="#1a1608" stroke="#665522" points="1436,-398.25 1084,-398.25 1084,-319 1442,-319 1442,-392.25 1436,-398.25"/>
<polyline fill="none" stroke="#665522" points="1436,-398.25 1436,-392.25"/>
<polyline fill="none" stroke="#665522" points="1442,-392.25 1436,-392.25"/>
<text xml:space="preserve" text-anchor="middle" x="1263" y="-384.75" font-family="monospace" font-size="10.00" fill="#ccaa66">Categories are organisational only, the file says so</text>
<text xml:space="preserve" text-anchor="middle" x="1263" y="-370.5" font-family="monospace" font-size="10.00" fill="#ccaa66">directly. pacman treats every package identically once</text>
<text xml:space="preserve" text-anchor="middle" x="1263" y="-356.25" font-family="monospace" font-size="10.00" fill="#ccaa66">installed, there is no protected tier: removing something</text>
<text xml:space="preserve" text-anchor="middle" x="1263" y="-342" font-family="monospace" font-size="10.00" fill="#ccaa66">the desktop depends on (waybar, labwc, a zsh plugin) is</text>
<text xml:space="preserve" text-anchor="middle" x="1263" y="-327.75" font-family="monospace" font-size="10.00" fill="#ccaa66">on you to avoid, same as any other Arch install.</text>
</g>
